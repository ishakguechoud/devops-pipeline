service:
  type: NodePort
  port: 5000
  nodePort: 30010

env:
  KEYCLOAK_BASE_URL: "http://172.28.77.160:8086"
  KEYCLOAK_REALM: "zak-local"
  # 🟢 On force le frontend de préprod à appeler les services de préprod
  # Format : http://<NOM-DU-SERVICE>.<NAMESPACE>.svc.cluster.local:<PORT>
  USERS_SERVICE_URL: "http://app-users.preprod-platform.svc.cluster.local:5001"
  PRODUCTS_SERVICE_URL: "http://app-products.preprod-platform.svc.cluster.local:5002"

serviceAccount:
  name: "frontend-sa"

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "frontend-role"
  vault.hashicorp.com/agent-inject-secret-keycloak: "secret/data/frontend"
  vault.hashicorp.com/agent-inject-template-keycloak: |
    {{ with secret "secret/data/frontend" -}}
    keycloak-client-secret: {{ index .Data.data "keycloak-client-secret" }}
    {{- end }}

ingress:
  enabled: true
  host: app.preprod.zak-local