replicaCount: 2

service:
  nodePort: 31000

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "frontend-role"
  vault.hashicorp.com/agent-inject-secret-keycloak: "secret/frontend"
  vault.hashicorp.com/agent-inject-template-keycloak: |
    {{ with secret "secret/frontend" -}}
    {{ .Data.data.keycloak_client_secret }}
    {{- end }}