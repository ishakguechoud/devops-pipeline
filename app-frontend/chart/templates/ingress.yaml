apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-frontend-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # 🔧 Force la communication en HTTP simple vers le pod Flask
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # 🔧 Permet de gérer correctement les redirections d'en-têtes (comme ton 302)
    nginx.ingress.kubernetes.io/proxy-redirect-from: "http://preprod.workflow-devops.local/"
    nginx.ingress.kubernetes.io/proxy-redirect-to: "/"
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app-frontend-preprod-service
            port:
              number: 5000