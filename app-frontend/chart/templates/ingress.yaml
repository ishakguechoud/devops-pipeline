apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-frontend-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    # On garde l'annotation mais on ajoute la nouvelle norme pour K3s
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            # On utilise le même nom de service que ton template service.yaml
            name: {{ include "app-frontend.fullname" . }}-service
            port:
              number: 5000