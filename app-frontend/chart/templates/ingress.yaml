apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-frontend-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            # On combine le nom de la release (app-frontend) et la valeur de l'environnement
            name: {{ .Release.Name }}-{{ .Values.environment | default "preprod" }}-service
            port:
              number: 5000