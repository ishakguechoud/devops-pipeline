apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-users
  template:
    metadata:
      labels:
        app: app-users
    spec:
      containers:
        - name: app-users
          image: app-users:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: app-users
spec:
  selector:
    app: app-users
  ports:
    - port: 5001
      targetPort: 5001
  type: NodePort
