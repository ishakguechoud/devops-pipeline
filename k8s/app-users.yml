apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-users
  namespace: devops-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-users
  template:
    metadata:
      labels:
        app: app-users
    spec:
      containers:
        - name: app-users
          image: 192.168.74.128:8082/app-users:v12
          ports:
            - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: app-users
  namespace: devops-pipeline
spec:
  selector:
    app: app-users
  type: NodePort
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30001
