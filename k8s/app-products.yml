apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-products
  namespace: devops-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-products
  template:
    metadata:
      labels:
        app: app-products
    spec:
      containers:
        - name: app-products
          image: 192.168.74.128:8082/app-products:v12
          ports:
            - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: app-products
  namespace: devops-pipeline
spec:
  selector:
    app: app-products
  type: NodePort
  ports:
    - port: 5002
      targetPort: 5002
      nodePort: 30002
