apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-products
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-products
  template:
    metadata:
      labels:
        app: app-products
    spec:
      containers:
        - name: app-products
          image: app-products:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: app-products
spec:
  selector:
    app: app-products
  ports:
    - port: 5002
      targetPort: 5002
  type: NodePort
